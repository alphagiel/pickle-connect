<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle Connect — Code Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
    --border: #2e3345; --text: #e2e4ed; --text2: #8b8fa3;
    --blue: #60a5fa; --purple: #a78bfa; --green: #34d399;
    --orange: #fb923c; --red: #f87171; --pink: #f472b6;
    --amber: #fbbf24; --cyan: #22d3ee; --teal: #2dd4bf;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  code, .mono { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }

  /* Top bar */
  .topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 44px; }
  .topbar h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .topbar h1 span { color: var(--green); }
  .view-tabs { display: flex; gap: 2px; background: var(--bg); border-radius: 6px; padding: 2px; }
  .view-tab { padding: 5px 12px; font-size: 12px; border: none; background: none; color: var(--text2); cursor: pointer; border-radius: 4px; white-space: nowrap; transition: all .15s; }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { background: var(--surface2); color: var(--text); }
  .zoom-controls { display: flex; gap: 4px; margin-left: auto; }
  .zoom-btn { width: 28px; height: 28px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .zoom-btn:hover { border-color: var(--text2); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 280px; min-width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
  .sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 8px; }

  .search-box { width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; outline: none; }
  .search-box:focus { border-color: var(--green); }
  .search-box::placeholder { color: var(--text2); }

  .layer-toggles { display: flex; flex-direction: column; gap: 4px; }
  .layer-toggle { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background .1s; }
  .layer-toggle:hover { background: var(--surface2); }
  .layer-toggle input { display: none; }
  .layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .layer-toggle.off .layer-label { color: var(--text2); text-decoration: line-through; }

  .conn-toggles { display: flex; flex-direction: column; gap: 4px; }
  .conn-toggle { display: flex; align-items: center; gap: 8px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .conn-toggle:hover { background: var(--surface2); }
  .conn-line { width: 18px; height: 2px; flex-shrink: 0; border-radius: 1px; }

  /* File tree */
  .file-tree { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 12px; }
  .file-tree::-webkit-scrollbar { width: 4px; }
  .file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .ft-dir { cursor: pointer; padding: 2px 0; color: var(--text2); user-select: none; }
  .ft-dir:hover { color: var(--text); }
  .ft-dir::before { content: '▶ '; font-size: 8px; display: inline-block; transition: transform .1s; }
  .ft-dir.open::before { transform: rotate(90deg); }
  .ft-children { padding-left: 14px; display: none; }
  .ft-dir.open + .ft-children { display: block; }
  .ft-file { padding: 2px 0; color: var(--text2); cursor: pointer; font-size: 11px; }
  .ft-file:hover { color: var(--text); }
  .ft-file.highlight { color: var(--green); font-weight: 600; }
  .hidden { display: none !important; }

  /* Comments */
  .comments-section { border-top: 1px solid var(--border); max-height: 200px; overflow-y: auto; }
  .comments-section::-webkit-scrollbar { width: 4px; }
  .comments-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .comment-item { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
  .comment-item .comment-target { color: var(--green); font-weight: 600; }
  .comment-item .comment-text { color: var(--text2); margin-top: 2px; }
  .comment-item .comment-del { float: right; background: none; border: none; color: var(--red); cursor: pointer; font-size: 11px; opacity: .6; }
  .comment-item .comment-del:hover { opacity: 1; }

  /* Canvas */
  .canvas-area { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
  .canvas-area svg { width: 100%; height: 100%; cursor: grab; }
  .canvas-area svg:active { cursor: grabbing; }

  /* Node styles */
  .node-rect { rx: 6; ry: 6; stroke-width: 1.5; cursor: pointer; transition: filter .15s; }
  .node-rect:hover { filter: brightness(1.3); }
  .node-group text { pointer-events: none; }
  .node-title { font-size: 11px; font-weight: 600; fill: var(--text); }
  .node-subtitle { font-size: 9px; fill: var(--text2); font-family: 'SF Mono', monospace; }
  .node-commented { stroke-dasharray: none !important; stroke-width: 2.5 !important; }

  .conn-path { fill: none; stroke-width: 1.5; }
  .conn-label { font-size: 9px; fill: var(--text2); }

  /* State machine */
  .state-node { cursor: pointer; }
  .state-circle { stroke-width: 2; }
  .state-label { font-size: 11px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
  .state-arrow { fill: none; stroke-width: 1.5; }
  .state-arrow-label { font-size: 9px; fill: var(--text2); }

  /* Detail panel */
  .detail-panel { position: absolute; top: 12px; right: 12px; width: 320px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 12px; display: none; max-height: 80%; overflow-y: auto; z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .detail-panel.visible { display: block; }
  .detail-panel h3 { font-size: 14px; margin-bottom: 4px; }
  .detail-panel .detail-path { font-size: 11px; color: var(--text2); font-family: monospace; margin-bottom: 12px; }
  .detail-panel .detail-desc { color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
  .detail-panel .detail-list { list-style: none; }
  .detail-panel .detail-list li { padding: 3px 0; color: var(--text2); }
  .detail-panel .detail-list li code { color: var(--blue); background: var(--bg); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  .detail-close { position: absolute; top: 8px; right: 12px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; }
  .detail-close:hover { color: var(--text); }
  .detail-comment-btn { margin-top: 8px; padding: 6px 12px; background: var(--green); color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
  .detail-comment-btn:hover { filter: brightness(1.1); }

  /* Comment modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 400px; }
  .modal h3 { font-size: 14px; margin-bottom: 12px; }
  .modal textarea { width: 100%; height: 80px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 8px; font-size: 12px; resize: vertical; outline: none; font-family: inherit; }
  .modal textarea:focus { border-color: var(--green); }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .modal-actions button { padding: 6px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
  .modal-cancel { background: var(--surface2); color: var(--text); }
  .modal-save { background: var(--green); color: #000; font-weight: 600; }

  /* Prompt bar */
  .prompt-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
  .prompt-text { flex: 1; font-size: 12px; color: var(--text2); line-height: 1.5; max-height: 80px; overflow-y: auto; white-space: pre-wrap; }
  .prompt-text::-webkit-scrollbar { width: 4px; }
  .prompt-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .copy-btn { padding: 6px 14px; background: var(--green); color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .copy-btn:hover { filter: brightness(1.1); }

  /* Legend */
  .legend { position: absolute; bottom: 12px; left: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-size: 10px; z-index: 5; }
  .legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-line { width: 20px; height: 0; border-top: 2px solid; flex-shrink: 0; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1><span>Pickle Connect</span> Code Map</h1>

<div class="main">

</div>

<!-- Comment modal -->
<div class="modal-overlay" id="modalOverlay">

</div>

// ─── SVG HELPERS ────────────────────────────────────────────────────
const svg = document.getElementById('svg');
const svgGroup = document.getElementById('svgGroup');

function getNodeCenter(n) { return { x: n.x + n.w/2, y: n.y + n.h/2 }; }

function getNodeEdge(from, to) {
  const fc = getNodeCenter(from), tc = getNodeCenter(to);
  const dx = tc.x - fc.x, dy = tc.y - fc.y;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  let fx, fy, tx, ty;
  // From node edge
  if (absDx / from.w > absDy / from.h) {
    fx = fc.x + (dx > 0 ? from.w/2 : -from.w/2);
    fy = fc.y + dy * (from.w/2) / absDx * (dx > 0 ? 1 : -1);
    fy = Math.max(from.y, Math.min(from.y + from.h, fy));
  } else {
    fy = fc.y + (dy > 0 ? from.h/2 : -from.h/2);
    fx = fc.x + dx * (from.h/2) / absDy * (dy > 0 ? 1 : -1);
    fx = Math.max(from.x, Math.min(from.x + from.w, fx));
  }
  // To node edge
  const dx2 = fx - tc.x, dy2 = fy - tc.y;
  const absDx2 = Math.abs(dx2), absDy2 = Math.abs(dy2);
  if (absDx2 / to.w > absDy2 / to.h) {
    tx = tc.x + (dx2 > 0 ? to.w/2 : -to.w/2);
    ty = tc.y + dy2 * (to.w/2) / absDx2 * (dx2 > 0 ? 1 : -1);
    ty = Math.max(to.y, Math.min(to.y + to.h, ty));
  } else {
    ty = tc.y + (dy2 > 0 ? to.h/2 : -to.h/2);
    tx = tc.x + dx2 * (to.h/2) / absDy2 * (dy2 > 0 ? 1 : -1);
    tx = Math.max(to.x, Math.min(to.x + to.w, tx));
  }
  return { fx, fy, tx, ty };
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
  return el;
}

function nodeColor(layer) {
  const map = { presentation:'#1e3a5f', providers:'#2d1f5e', repositories:'#1a3d2e', models:'#4a2e10', firebase:'#4a1a1a', config:'#3d3410' };
  return map[layer] || '#1a1d27';
}
function nodeBorder(layer) {
  return LAYERS[layer]?.color || '#6b7280';
}

// ─── RENDER ─────────────────────────────────────────────────────────
function render() {
  const view = VIEWS[state.view];
  if (!view) return;
  svgGroup.innerHTML = '';

  const nodesById = {};
  view.nodes.forEach(n => nodesById[n.id] = n);

  // Draw connections
  view.connections.forEach(c => {
    const fromN = nodesById[c.from], toN = nodesById[c.to];
    if (!fromN || !toN) return;
    if (!state.layers[fromN.layer] || !state.layers[toN.layer]) return;
    if (!state.connections[c.type]) return;

    const ct = CONN_TYPES[c.type];
    if (!ct) return;
    const { fx, fy, tx, ty } = getNodeEdge(fromN, toN);
    const mx = (fx+tx)/2, my = (fy+ty)/2;
    const cpOffset = Math.min(40, Math.max(15, Math.abs(fy-ty)*0.3));

    const path = svgEl('path', {
      d: `M${fx},${fy} C${fx},${fy+cpOffset} ${tx},${ty-cpOffset} ${tx},${ty}`,
      stroke: ct.color, fill:'none', 'stroke-width':'1.5', class:'conn-path',
      'stroke-dasharray': ct.dash || '', 'marker-end': `url(#arrow-${ct.color === '#60a5fa' ? 'blue' : ct.color === '#a78bfa' ? 'purple' : ct.color === '#f87171' ? 'red' : 'gray'})`
    });
    svgGroup.appendChild(path);

    if (c.label) {
      const lbl = svgEl('text', { x: mx, y: my - 4, class:'conn-label', 'text-anchor':'middle', fill:'#6b7280', 'font-size':'9' });
      lbl.textContent = c.label;
      svgGroup.appendChild(lbl);
    }
  });

  // Draw nodes
  view.nodes.forEach(n => {
    if (!state.layers[n.layer]) return;
    const g = svgEl('g', { class:'node-group', 'data-id': n.id });

    const hasComment = state.comments.some(c => c.target === n.id);
    const rect = svgEl('rect', {
      x: n.x, y: n.y, width: n.w, height: n.h,
      fill: nodeColor(n.layer), stroke: nodeBorder(n.layer),
      class: 'node-rect' + (hasComment ? ' node-commented' : ''),
      'stroke-width': hasComment ? '2.5' : '1.5'
    });
    g.appendChild(rect);

    const title = svgEl('text', { x: n.x + 8, y: n.y + 16, class:'node-title', 'font-size':'11', 'font-weight':'600', fill:'#e2e4ed' });
    title.textContent = n.label;
    g.appendChild(title);

    if (n.subtitle) {
      const sub = svgEl('text', { x: n.x + 8, y: n.y + 30, class:'node-subtitle', 'font-size':'9', fill:'#8b8fa3', 'font-family':'monospace' });
      sub.textContent = n.subtitle.length > 28 ? n.subtitle.slice(0, 26) + '…' : n.subtitle;
      g.appendChild(sub);
    }

    g.addEventListener('click', (e) => { e.stopPropagation(); showDetail(n); });
    svgGroup.appendChild(g);
  });

  // Update transform
  updateTransform();
  updateLegend();
  updatePrompt();
}

function updateTransform() {
  svgGroup.setAttribute('transform', `translate(${state.panX},${state.panY}) scale(${state.zoom})`);
}

// ─── DETAIL PANEL ───────────────────────────────────────────────────
const detailPanel = document.getElementById('detailPanel');
const detailTitle = document.getElementById('detailTitle');
const detailPath = document.getElementById('detailPath');
const detailDesc = document.getElementById('detailDesc');

function showDetail(n) {
  state.selectedNode = n;
  detailTitle.textContent = n.label;
  detailPath.textContent = n.subtitle;
  detailDesc.textContent = n.desc || '';
  detailList.innerHTML = '';
  (n.details || []).forEach(d => {
    const li = document.createElement('li');
    li.innerHTML = `<code>${d}</code>`;
    detailList.appendChild(li);
  });
  detailPanel.classList.add('visible');
}

document.getElementById('detailClose').addEventListener('click', () => {

  state.selectedNode = null;
});

document.getElementById('detailCommentBtn').addEventListener('click', () => {
  if (!state.selectedNode) return;
  state.commentTarget = state.selectedNode;
  document.getElementById('modalTitle').textContent = `Comment on: ${state.selectedNode.label}`;
  document.getElementById('modalText').value = '';
  document.getElementById('modalOverlay').classList.add('visible');
  setTimeout(() => document.getElementById('modalText').focus(), 50);
});

// ─── COMMENT MODAL ──────────────────────────────────────────────────
document.getElementById('modalCancel').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('visible');
});
document.getElementById('modalSave').addEventListener('click', () => {
  const text = document.getElementById('modalText').value.trim();
  if (!text || !state.commentTarget) return;
  state.comments.push({
    id: Date.now(),
    target: state.commentTarget.id,
    targetLabel: state.commentTarget.label,
    targetFile: state.commentTarget.subtitle,
    text
  });
  document.getElementById('modalOverlay').classList.remove('visible');
  renderComments();
  render();
});

function renderComments() {
  const list = document.getElementById('commentsList');
  list.innerHTML = '';
  document.getElementById('commentCount').textContent = state.comments.length;
  state.comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment-item';
    div.innerHTML = `<button class="comment-del" data-id="${c.id}">&times;</button><div class="comment-target">${c.targetLabel}</div><div class="comment-text">${c.text}</div>`;
    div.querySelector('.comment-del').addEventListener('click', () => {
      state.comments = state.comments.filter(x => x.id !== c.id);
      renderComments();
      render();
    });
    list.appendChild(div);
  });
}

// ─── LEGEND ─────────────────────────────────────────────────────────
function updateLegend() {
  const legend = document.getElementById('legend');
  let html = '<div style="font-weight:600;margin-bottom:6px;">Layers</div>';
  for (const [k, v] of Object.entries(LAYERS)) {
    if (state.layers[k]) html += `<div class="legend-row"><div class="legend-swatch" style="background:${v.color}"></div><span>${v.label.split('(')[0].trim()}</span></div>`;
  }
  html += '<div style="font-weight:600;margin-top:8px;margin-bottom:6px;">Connections</div>';
  for (const [k, v] of Object.entries(CONN_TYPES)) {
    if (state.connections[k]) html += `<div class="legend-row"><div class="legend-line" style="border-color:${v.color};${v.dash ? 'border-style:dashed;' : ''}"></div><span>${v.label}</span></div>`;
  }
  legend.innerHTML = html;
}

// ─── PROMPT ─────────────────────────────────────────────────────────
function updatePrompt() {
  const viewLabels = { architecture:'full architecture', dataflow:'data flow', features:'feature map', firestore:'Firestore schema', lifecycle:'match lifecycle' };
  const visibleLayers = Object.entries(state.layers).filter(([,v])=>v).map(([k])=>LAYERS[k]?.label.split('(')[0].trim()).filter(Boolean);

  let text = `This is the Pickle Connect ${viewLabels[state.view] || 'architecture'}, showing ${visibleLayers.join(', ')} layers.`;

  if (state.comments.length > 0) {
    text += '\n\nFeedback on specific components:\n';
    state.comments.forEach(c => {
      text += `\n**${c.targetLabel}** (${c.targetFile}):\n${c.text}\n`;
    });
  }

  document.getElementById('promptText').textContent = text;
}

document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
  });
});

// ─── VIEW TABS ──────────────────────────────────────────────────────
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.view = tab.dataset.view;
    state.panX = 20; state.panY = 20; state.zoom = 1;
    detailPanel.classList.remove('visible');

// ─── LAYER TOGGLES ──────────────────────────────────────────────────
function buildLayerToggles() {
  const container = document.getElementById('layerToggles');
  container.innerHTML = '';
  for (const [k, v] of Object.entries(LAYERS)) {
    const div = document.createElement('label');
    div.className = 'layer-toggle' + (state.layers[k] ? '' : ' off');
    div.innerHTML = `<input type="checkbox" ${state.layers[k] ? 'checked' : ''} data-layer="${k}"><div class="layer-dot" style="background:${v.color}"></div><span class="layer-label">${v.label}</span>`;
    div.querySelector('input').addEventListener('change', (e) => {
      state.layers[k] = e.target.checked;
      div.classList.toggle('off', !e.target.checked);
      render();
    });
    container.appendChild(div);
  }
}

function buildConnToggles() {
  const container = document.getElementById('connToggles');
  container.innerHTML = '';
  for (const [k, v] of Object.entries(CONN_TYPES)) {
    const div = document.createElement('label');
    div.className = 'conn-toggle';
    div.innerHTML = `<input type="checkbox" ${state.connections[k] ? 'checked' : ''} data-conn="${k}"><div class="conn-line" style="background:${v.color};${v.dash ? 'border-top:2px dashed ' + v.color + ';background:none;' : ''}"></div><span>${v.label}</span>`;
    div.querySelector('input').addEventListener('change', (e) => {
      state.connections[k] = e.target.checked;
      render();
    });
    container.appendChild(div);
  }
}

// ─── FILE TREE ──────────────────────────────────────────────────────
function buildFileTree(items, container, searchTerm) {
  items.forEach(item => {
    if (item.children) {
      const dir = document.createElement('div');
      dir.className = 'ft-dir';
      dir.textContent = item.name;
      const childDiv = document.createElement('div');
      childDiv.className = 'ft-children';
      buildFileTree(item.children, childDiv, searchTerm);

      // If searching, auto-open if has visible children
      if (searchTerm) {
        const hasMatch = childDiv.querySelector('.ft-file:not(.hidden)') || childDiv.querySelector('.ft-dir:not(.hidden)');
        if (hasMatch) {
          dir.classList.add('open');
        } else {
          dir.classList.add('hidden');
          childDiv.classList.add('hidden');
        }
      }

      dir.addEventListener('click', (e) => { e.stopPropagation(); dir.classList.toggle('open'); });
      container.appendChild(dir);
      container.appendChild(childDiv);
    } else {
      const file = document.createElement('div');
      file.className = 'ft-file';
      file.textContent = item.name;
      if (searchTerm && !item.name.toLowerCase().includes(searchTerm)) {
        file.classList.add('hidden');
      } else if (searchTerm) {
        file.classList.add('highlight');
      }
      file.addEventListener('click', () => {
        // Find matching node
        const views = Object.values(VIEWS);
        for (const v of views) {
          const node = v.nodes.find(n => n.subtitle && n.subtitle.includes(item.name.replace('.dart','').replace('.ts','')));
          if (node) { showDetail(node); break; }
        }
      });
      container.appendChild(file);
    }
  });
}

function refreshFileTree(search) {
  const container = document.getElementById('fileTree');
  container.innerHTML = '';
  buildFileTree(fileTreeData, container, search);
}

document.getElementById('searchBox').addEventListener('input', (e) => {
  refreshFileTree(e.target.value.toLowerCase().trim());
});

// ─── ZOOM & PAN ─────────────────────────────────────────────────────
document.getElementById('zoomIn').addEventListener('click', () => { state.zoom = Math.min(3, state.zoom + 0.15); updateTransform(); });
document.getElementById('zoomOut').addEventListener('click', () => { state.zoom = Math.max(0.3, state.zoom - 0.15); updateTransform(); });
document.getElementById('zoomReset').addEventListener('click', () => { state.zoom = 1; state.panX = 20; state.panY = 20; updateTransform(); });

// Pan with mouse drag
let isPanning = false, panStart = { x:0, y:0 };
const canvasArea = document.getElementById('canvasArea');
canvasArea.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node-group') || e.target.closest('.detail-panel')) return;
  isPanning = true; panStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
});
canvasArea.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  state.panX = e.clientX - panStart.x;
  state.panY = e.clientY - panStart.y;
  updateTransform();
});
canvasArea.addEventListener('mouseup', () => isPanning = false);
canvasArea.addEventListener('mouseleave', () => isPanning = false);

// Zoom with scroll
canvasArea.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  state.zoom = Math.min(3, Math.max(0.3, state.zoom + delta));
  updateTransform();
}, { passive: false });

// Click outside to close detail
svg.addEventListener('click', (e) => {
  if (!e.target.closest('.node-group')) {
    detailPanel.classList.remove('visible');
    state.selectedNode = null;
  }
});

// ─── INIT ───────────────────────────────────────────────────────────
state.panX = 20; state.panY = 20;
buildLayerToggles();
buildConnToggles();
refreshFileTree('');
render();
